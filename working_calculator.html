<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .calculator {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 20px;
            width: 100%;
            max-width: 500px;
        }

        .display-container {
            margin-bottom: 20px;
        }

        .display {
            background: #333;
            color: #fff;
            font-size: 2em;
            padding: 20px;
            border-radius: 10px;
            text-align: right;
            min-height: 60px;
            word-wrap: break-word;
            word-break: break-all;
        }

        .history {
            background: #555;
            color: #aaa;
            font-size: 0.9em;
            padding: 8px 15px;
            border-radius: 8px;
            text-align: right;
            min-height: 25px;
            margin-bottom: 10px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        button {
            padding: 15px;
            font-size: 0.95em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .number, .decimal {
            background: #f0f0f0;
            color: #333;
        }

        .number:hover, .decimal:hover {
            background: #e0e0e0;
        }

        .operator {
            background: #667eea;
            color: white;
        }

        .operator:hover {
            background: #5568d3;
        }

        .scientific {
            background: #9f7aea;
            color: white;
        }

        .scientific:hover {
            background: #805ad5;
        }

        .equals {
            background: #48bb78;
            color: white;
        }

        .equals:hover {
            background: #38a169;
        }

        .clear {
            background: #f56565;
            color: white;
        }

        .clear:hover {
            background: #e53e3e;
        }

        .parenthesis {
            background: #ed8936;
            color: white;
        }

        .parenthesis:hover {
            background: #dd6b20;
        }

        button[style*="grid-column: span 2"] {
            grid-column: span 2;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display-container">
            <div class="history" id="history"></div>
            <div class="display" id="display">0</div>
        </div>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">AC</button>
            <button class="clear" onclick="deleteLast()">⌫</button>
            <button class="parenthesis" onclick="appendCharacter('(')">(</button>
            <button class="parenthesis" onclick="appendCharacter(')')">)</button>
            <button class="operator" onclick="appendOperator('/')">÷</button>

            <button class="scientific" onclick="scientificFunction('sin')">sin</button>
            <button class="scientific" onclick="scientificFunction('cos')">cos</button>
            <button class="scientific" onclick="scientificFunction('tan')">tan</button>
            <button class="scientific" onclick="scientificFunction('log')">log</button>
            <button class="operator" onclick="appendOperator('*')">×</button>

            <button class="scientific" onclick="scientificFunction('sqrt')">√</button>
            <button class="scientific" onclick="scientificFunction('cbrt')">∛</button>
            <button class="scientific" onclick="appendOperator('^')">x^y</button>
            <button class="scientific" onclick="appendOperator('%')">%</button>
            <button class="operator" onclick="appendOperator('-')">−</button>

            <button class="number" onclick="appendNumber('7')">7</button>
            <button class="number" onclick="appendNumber('8')">8</button>
            <button class="number" onclick="appendNumber('9')">9</button>
            <button class="scientific" onclick="scientificFunction('ln')">ln</button>
            <button class="operator" onclick="appendOperator('+')">+</button>

            <button class="number" onclick="appendNumber('4')">4</button>
            <button class="number" onclick="appendNumber('5')">5</button>
            <button class="number" onclick="appendNumber('6')">6</button>
            <button class="scientific" onclick="scientificFunction('factorial')">n!</button>
            <button class="scientific" onclick="toggleSign()">±</button>

            <button class="number" onclick="appendNumber('1')">1</button>
            <button class="number" onclick="appendNumber('2')">2</button>
            <button class="number" onclick="appendNumber('3')">3</button>
            <button class="scientific" onclick="appendCharacter('π')">π</button>
            <button class="decimal" onclick="appendDecimal()" style="grid-column: span 2">.</button>

            <button class="number" onclick="appendNumber('0')" style="grid-column: span 2">0</button>
            <button class="scientific" onclick="appendCharacter('e')">e</button>
            <button class="equals" onclick="calculate()" style="grid-column: span 2">=</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let history = document.getElementById('history');
        let currentInput = '0';
        let historyValue = '';
        let shouldResetDisplay = false;

        function updateDisplay() {
            display.textContent = currentInput;
        }

        function updateHistory() {
            history.textContent = historyValue;
        }

        function appendNumber(num) {
            if (shouldResetDisplay) {
                currentInput = num;
                shouldResetDisplay = false;
            } else {
                if (currentInput === '0' && num !== '.') {
                    currentInput = num;
                } else {
                    currentInput += num;
                }
            }
            updateDisplay();
        }

        function appendCharacter(char) {
            if (char === 'π') {
                if (currentInput === '0') {
                    currentInput = Math.PI.toString();
                } else {
                    currentInput += '*' + Math.PI.toString();
                }
            } else if (char === 'e') {
                if (currentInput === '0') {
                    currentInput = Math.E.toString();
                } else {
                    currentInput += '*' + Math.E.toString();
                }
            } else {
                currentInput += char;
            }
            updateDisplay();
        }

        function appendOperator(op) {
            if (shouldResetDisplay) {
                shouldResetDisplay = false;
            }
            if (currentInput && currentInput !== '0') {
                currentInput += op;
            }
            historyValue = currentInput;
            updateHistory();
        }

        function appendDecimal() {
            if (shouldResetDisplay) {
                currentInput = '0.';
                shouldResetDisplay = false;
            } else if (!currentInput.includes('.')) {
                currentInput += '.';
            }
            updateDisplay();
        }

        function deleteLast() {
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        function toggleSign() {
            const num = parseFloat(currentInput);
            currentInput = (num * -1).toString();
            updateDisplay();
        }

        function scientificFunction(func) {
            try {
                const value = parseFloat(currentInput);
                let result;

                switch (func) {
                    case 'sin':
                        result = Math.sin(value * Math.PI / 180);
                        break;
                    case 'cos':
                        result = Math.cos(value * Math.PI / 180);
                        break;
                    case 'tan':
                        result = Math.tan(value * Math.PI / 180);
                        break;
                    case 'sqrt':
                        result = Math.sqrt(value);
                        break;
                    case 'cbrt':
                        result = Math.cbrt(value);
                        break;
                    case 'log':
                        result = Math.log10(value);
                        break;
                    case 'ln':
                        result = Math.log(value);
                        break;
                    case 'factorial':
                        result = factorial(Math.floor(value));
                        break;
                    default:
                        return;
                }

                currentInput = result.toString();
                shouldResetDisplay = true;
                updateDisplay();
            } catch (e) {
                currentInput = 'Error';
                updateDisplay();
            }
        }

        function factorial(n) {
            if (n < 0) return NaN;
            if (n === 0 || n === 1) return 1;
            let result = 1;
            for (let i = 2; i <= n; i++) {
                result *= i;
            }
            return result;
        }

        function calculate() {
            try {
                let expression = currentInput
                    .replace(/π/g, Math.PI)
                    .replace(/e/g, Math.E)
                    .replace(/\^/g, '**')
                    .replace(/÷/g, '/')
                    .replace(/×/g, '*')
                    .replace(/−/g, '-');

                const result = Function('"use strict"; return (' + expression + ')')();
                
                if (!isFinite(result)) {
                    currentInput = 'Error';
                } else {
                    historyValue = currentInput + ' =';
                    currentInput = result.toString();
                }
                
                shouldResetDisplay = true;
                updateDisplay();
                updateHistory();
            } catch (e) {
                currentInput = 'Error';
                updateDisplay();
            }
        }

        function clearDisplay() {
            currentInput = '0';
            historyValue = '';
            shouldResetDisplay = false;
            updateDisplay();
            updateHistory();
        }
    </script>
</body>
</html>
